  WHITE-CIDR-RU:
    type: http
    url: "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile.txt"
    path: ./proxy-providers/WHITE-CIDR-RU.yaml
    interval: 3600

# Прокси
proxies:
# Старые AWG прокси (WARP)
- name: "APTEKA"
  <<: *warp-common
  amnezia-wg-option:
   jc: 4
   jmin: 40
   jmax: 70
   s1: 0
   s2: 0
   h1: 1
   h2: 2
   h4: 3
   h3: 4
   i1: <b >

- name: "YANDEX"
  <<: *warp-common
  amnezia-wg-option:
   jc: 4
   jmin: 40
   jmax: 70
   s1: 0
   s2: 0
   h1: 1
   h2: 2
   h4: 3
   h3: 4  
   i1: <b >

- name: "DNS"
  <<: *warp-common
  amnezia-wg-option:
   jc: 4
   jmin: 40
   jmax: 70
   s1: 0
   s2: 0
   h1: 1
   h2: 2
   h4: 3
   h3: 4   
   i1: <b 0x123401000001000000000000076578616d706c6503636f6d0000010001>

- name: "SIP"
  <<: *warp-common
  amnezia-wg-option:
   jc: 4
   jmin: 40
   jmax: 70
   s1: 0
   s2: 0
   h1: 1
   h2: 2
   h4: 3
   h3: 4   
   i1: <b >
   i2: <b >

