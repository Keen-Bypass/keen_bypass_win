  type: wireguard
  ip: 172.16.0.2
  ipv6: 2606:4700:110:8964:bca4:4830:e1dd:f7f9
  private-key: GC4g9Bb32jd2a9VZSSHLpwL7BvIxvyF//AmDlvxrlG0=
  public-key: bmXOC+F1FxEMF9dyiK2H5/1SUtzH0JuVo51h2wPfgyo=
  allowed-ips: ['0.0.0.0/0']
  reserved: [224, 189, 155]
  udp: true
  persistent-keepalive: 15
  mtu: 1280
  remote-dns-resolve: true
  dns: [1.1.1.1, 1.0.0.1, 2606:4700:4700::1111, 2606:4700:4700::1001]
  server: 162.159.192.1
  port: 4500

proxy-providers:
  BLACK_VLESS_RUS:
    type: http
    url: "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/BLACK_VLESS_RUS_mobile.txt"
    path: ./proxy-providers/BLACK_VLESS_RUS.yaml
