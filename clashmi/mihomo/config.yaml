# --- ОСНОВНЫЕ ПОРТЫ ---
port: 7890             # HTTP/HTTPS порт для ПК/клиентов
socks-port: 7891       # SOCKS5 порт
mixed-port: 1080       # Объединённый порт для редиректов
redir-port: 1182       # TProxy для LAN устройств
tproxy-port: 1181      # TProxy
allow-lan: true
mode: rule
log-level: silent
ipv6: false            # Можно включить true если сеть поддерживает
tcp-concurrent: true
unified-delay: true
geo-auto-update: true
geo-update-interval: 168
external-controller: 0.0.0.0:9090
external-ui: ./zash
external-ui-url: "https://github.com/Zephyruso/zashboard/releases/latest/download/dist-cdn-fonts.zip"
geodata-mode: true

# --- ПРОФИЛЬ ---
profile:
  store-selected: true
find-process-mode: "off"


# --- НАСТРОЙКИ СНИФФЕРА ---
sniffer:
  enable: true
  force-dns-mapping: true
  sniff:
    HTTP:
      ports: [80]
      override-destination: true
    TLS:
      ports: [443]
    QUIC:
      ports: [443]
      
# --- НАСТРОЙКИ DNS ---
dns:
  enable: true
  listen: 0.0.0.0:7874
  ipv6: false
  cache-algorithm: arc

  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16

  use-hosts: true
  respect-rules: true


  # Используем ЧИСТЫЕ IP
  proxy-server-nameserver:
    - 1.1.1.1
    - 8.8.8.8

  # Bootstrap DNS (ВСЕГДА IP)
  default-nameserver:
    - 1.1.1.1
    - 8.8.8.8

  # Основные DNS — ТОЛЬКО DoH
  nameserver:
    - https://cloudflare-dns.com/dns-query
    - https://doh.opendns.com/dns-query
    - https://dns.google/dns-query

  # Точечные политики
  nameserver-policy:
    '+.supercell.net': https://dns.google/dns-query
    '+.brawlstarsgame.com': https://dns.google/dns-query

  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - '*.lan'
    - '*.local'
    - 'localhost'

    # Системные проверки
    - +.msftconnecttest.com
    - +.msftncsi.com
    - +.connectivitycheck.gstatic.com
    - +.detectportal.firefox.com

    # NTP
    - +.pool.ntp.org
    - +.ntp.org
    - +.time.windows.com

    # Мобильные сети
    - +.3gppnetwork.org

# --- ПРОВАЙДЕРЫ ПРОКСИ ---
