# --- ГРУППЫ ПРОКСИ (ПОЛИТИКИ) ---
proxy-groups:

  # ТЕХНИЧЕСКИЕ ГРУППЫ С ФИЛЬТРАЦИЕЙ

  - name: WARP
    type: url-test
    icon: https://www.vectorlogo.zone/logos/cloudflare/cloudflare-icon.svg
    proxies:
      - "APTEKA"
      - "YANDEX"
      - "DNS"
      - "SIP"
    url: 'http://speed.cloudflare.com/'
    interval: 60
    timeout: 1000

  # НОВАЯ ГРУППА: WARP Relay (обновлённая)
  - name: WARP (Relay)
    type: url-test
    icon: https://www.vectorlogo.zone/logos/cloudflare/cloudflare-icon.svg
    proxies:
      - "🇳🇱 Netherlands (NL3)"
      - "🇳🇱 Netherlands #2 (NL0)"
      - "🇩🇪 Germany (DE)"
      - "🇱🇹 Lithuania (LT)"
      - "🇫🇮 Finland (FI)"
      - "🇫🇮 Finland (FI0)"
      - "🇵🇱 Poland (PL)"
      - "🇪🇪 Estonia (EE)"
    url: 'http://speed.cloudflare.com/'
    interval: 60
    timeout: 1000

  # Черные списки GEO (без РФ)
  - name: 'Черные списки GEO'
    type: url-test
    url: 'https://www.gstatic.com/generate_204'
    interval: 60
    tolerance: 50
    timeout: 3000
    filter: "^(?!.*(?i)(ru$|rus$|russia|россия|moscow|москва|spb|питер|sankt|казань|novosibirsk|yekaterinburg|chelyabinsk|ufa|rostov|volgograd|perm|krasnoyarsk|voronezh|sar)|%F0%9F%87%B7%F0%9F%87%BA|🇷🇺).*"
